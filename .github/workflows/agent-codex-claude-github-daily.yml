name: Agent Codex Claude GitHub Daily

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional Beijing date (YYYY-MM-DD)"
        required: false

concurrency:
  group: agent-codex-claude-github-daily
  cancel-in-progress: false

jobs:
  generate-and-deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      BRIEF_PROFILE: agent-codex-claude-github-daily
      REPORT_TIMEZONE: Asia/Shanghai
      LOOKBACK_HOURS: "24"
      GITHUB_TOKEN: ${{ github.token }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL || vars.SMTP_USE_SSL || 'false' }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || vars.SMTP_USE_TLS || 'true' }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Copy example config when missing
        run: |
          if [ ! -f config.json ]; then
            cp config.example.json config.json
          fi

      - name: Run unit tests
        run: |
          python3 -m unittest discover -s tests

      - name: Generate GitHub daily brief
        run: |
          export SKIP_EMAIL=1
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ./run_brief.sh --date "${{ github.event.inputs.date }}"
          else
            ./run_brief.sh
          fi

      - name: Validate report structure
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            REPORT_DATE="${{ github.event.inputs.date }}"
          else
            REPORT_DATE=$(TZ=Asia/Shanghai date +%F)
          fi
          REPORT_PATH="reports/${REPORT_DATE}.md"
          test -s "$REPORT_PATH"
          grep -q "## 结论" "$REPORT_PATH"
          grep -q "## 来源" "$REPORT_PATH"
          printf 'REPORT_PATH=%s\n' "$REPORT_PATH" >> "$GITHUB_ENV"

      - name: Validate SMTP config
        if: ${{ env.SMTP_HOST != '' && env.EMAIL_TO != '' }}
        run: |
          python3 scripts/send_email_report.py --check-smtp

      - name: Send email
        if: ${{ env.SMTP_HOST != '' && env.EMAIL_TO != '' }}
        run: |
          python3 scripts/send_email_report.py "$REPORT_PATH"

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: agent-codex-claude-github-daily-${{ github.run_id }}
          path: |
            reports/
            artifacts/
            reviews/
