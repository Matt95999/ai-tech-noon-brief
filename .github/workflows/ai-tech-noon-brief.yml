name: AI Brief Validation

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile to run"
        required: false
        default: "ai-frontier-daily"

concurrency:
  group: ai-tech-noon-brief-${{ github.event.inputs.profile || vars.BRIEF_DEFAULT_PROFILE || 'ai-frontier-daily' }}
  cancel-in-progress: false

jobs:
  validate-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
      REPORT_TIMEZONE: ${{ vars.REPORT_TIMEZONE || 'Asia/Shanghai' }}
      LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '24' }}
      BRIEF_DEFAULT_PROFILE: ${{ vars.BRIEF_DEFAULT_PROFILE || 'ai-frontier-daily' }}
      BRIEF_PROFILE: ${{ github.event.inputs.profile || vars.BRIEF_DEFAULT_PROFILE || 'ai-frontier-daily' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Copy example config when missing
        run: |
          if [ ! -f config.json ]; then
            cp config.example.json config.json
          fi

      - name: Run unit tests
        run: |
          python3 -m unittest discover -s tests

      - name: Run dry-run validation pipeline
        run: |
          ./run_brief.sh --dry-run

      - name: Validate report structure
        run: |
          REPORT_DATE=$(TZ=Asia/Shanghai date +%F)
          REPORT_PATH="reports/${REPORT_DATE}.md"
          test -s "$REPORT_PATH"
          grep -q "Executive Summary" "$REPORT_PATH"
          grep -q "Source Log" "$REPORT_PATH"

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ai-brief-${{ github.run_id }}
          path: |
            reports/
            artifacts/
            reviews/
            summaries/
