name: AI Brief Automation

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile to run"
        required: false
        default: "ai-frontier-daily"
      dry_run:
        description: "Run with sample data only"
        required: false
        default: "false"

concurrency:
  group: ai-tech-noon-brief-${{ github.event.inputs.profile || vars.BRIEF_DEFAULT_PROFILE || 'ai-frontier-daily' }}
  cancel-in-progress: false

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5' }}
      REPORT_TIMEZONE: ${{ vars.REPORT_TIMEZONE || 'Asia/Shanghai' }}
      LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '24' }}
      BRIEF_DEFAULT_PROFILE: ${{ vars.BRIEF_DEFAULT_PROFILE || 'ai-frontier-daily' }}
      BRIEF_PROFILE: ${{ github.event.inputs.profile || vars.BRIEF_DEFAULT_PROFILE || 'ai-frontier-daily' }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Copy example config when missing
        run: |
          if [ ! -f config.json ]; then
            cp config.example.json config.json
          fi

      - name: Run unit tests
        run: |
          python3 -m unittest discover -s tests

      - name: Run report pipeline
        run: |
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            ./run_brief.sh --dry-run
          else
            ./run_brief.sh
          fi

      - name: Validate report structure
        run: |
          REPORT_DATE=$(TZ=Asia/Shanghai date +%F)
          REPORT_PATH="reports/${REPORT_DATE}.md"
          test -s "$REPORT_PATH"
          grep -q "Executive Summary" "$REPORT_PATH"
          grep -q "Source Log" "$REPORT_PATH"

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-brief-${{ github.run_id }}
          path: |
            reports/
            artifacts/
            reviews/
            summaries/
