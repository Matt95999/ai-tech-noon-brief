name: Advanced Packaging Daily Live

on:
  schedule:
    # 08:30 CST (00:30 UTC) — morning edition
    - cron: "30 0 * * *"
    # 16:30 CST (08:30 UTC) — afternoon supplement
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional Beijing date (YYYY-MM-DD)"
        required: false

concurrency:
  group: advanced-packaging-daily-live
  cancel-in-progress: false

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      BRIEF_PROFILE: advanced-packaging-daily
      REPORT_TIMEZONE: Asia/Shanghai
      LOOKBACK_HOURS: "24"
      DEEPSEEK_API_URL: ${{ secrets.DEEPSEEK_API_URL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || vars.DEEPSEEK_MODEL || 'deepseek-chat' }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Copy example config when missing
        run: |
          if [ ! -f config.json ]; then
            cp config.example.json config.json
          fi

      - name: Run unit tests
        run: |
          python3 -m unittest discover -s tests

      - name: Validate DeepSeek config
        run: |
          python3 scripts/run_profile.py --profile advanced-packaging-daily --check-deepseek

      - name: Validate Feishu config
        run: |
          python3 scripts/send_feishu_report.py --check-feishu

      - name: Generate daily brief
        run: |
          export SKIP_EMAIL=1
          # Afternoon run (UTC hour >= 8 = Beijing >= 16): shorter lookback for freshness
          UTC_HOUR=$(TZ=UTC date +%H)
          if [ "$UTC_HOUR" -ge 8 ]; then
            echo "Afternoon supplement run — using 10h lookback for freshness"
            export LOOKBACK_HOURS=10
          fi
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ./run_brief.sh --date "${{ github.event.inputs.date }}"
          else
            ./run_brief.sh
          fi

      - name: Validate report structure
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            REPORT_DATE="${{ github.event.inputs.date }}"
          else
            REPORT_DATE=$(TZ=Asia/Shanghai date +%F)
          fi
          REPORT_PATH="reports/${REPORT_DATE}.md"
          test -s "$REPORT_PATH"
          # V2 template check: core thesis, global leader, supply chain, source log
          grep -qE "(核心观点|Executive Summary)" "$REPORT_PATH"
          grep -qE "(全球龙头|Global Leader|Leader Watch)" "$REPORT_PATH"
          grep -qE "(供应链雷达|Supply Chain Radar)" "$REPORT_PATH"
          grep -qE "(信源追溯|Source Log|来源)" "$REPORT_PATH"
          printf 'REPORT_PATH=%s\n' "$REPORT_PATH" >> "$GITHUB_ENV"

      - name: Collector statistics
        run: |
          echo "=== 采集统计 ==="
          echo "报告: $REPORT_PATH"
          LINES=$(wc -l < "$REPORT_PATH")
          echo "行数: ${LINES}"
          echo ""
          echo "--- 信源分层 ---"
          python3 -c "
import re
text = open('$REPORT_PATH').read()
# Extract source audit table if present
audit = re.findall(r'\\|\\s*\\S[^|]+\\|', text)
print(f'报告总字符: {len(text)}')
# Section count
sections = re.findall(r'^## ', text, re.MULTILINE)
print(f'Sections: {len(sections)}')
# Low signal check
if '无重大新增' in text:
    print('Signal: LOW (无重大新增)')
else:
    print('Signal: NORMAL')
"
          echo "--- 采集渠道摘要 ---"
          grep -cE "(TIER|tier|Source|信源)" "$REPORT_PATH" || true
          echo ""
          echo "=== 统计完成 ==="

      - name: Send Feishu card
        run: |
          python3 scripts/send_feishu_report.py "$REPORT_PATH" --subject-prefix "先进封装产业每日观察"

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: advanced-packaging-daily-${{ github.run_id }}
          path: |
            reports/
            artifacts/
            reviews/
